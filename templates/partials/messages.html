{% if messages %}
<div class="container message-container stack stack--gap-sm">
    {% for message in messages %}
        <div class="card card--alert card--alert-{{ message.tags }}">
            <strong class="message-tag">{{ message.tags|title }}</strong>
            <p class="message-text">{{ message }}</p>
        </div>
    {% endfor %}
</div>
{% endif %}
