{% extends "base.html" %}

{% block title %}Login - EchoDesk{% endblock %}

{% block content %}

<div class="form-container">

    <h2>Login to Your Account</h2>

    <p class="form-subtitle">
        Sign in to access your complaints and dashboard
    </p>

    <form method="post" novalidate>

        {% csrf_token %}

        <div class="form-group">

            <label for="id_username">
                Username
            </label>

            <input
                type="text"
                name="username"
                id="id_username"
                placeholder="Enter your username"
                required
                autofocus
            >

        </div>

        <div class="form-group">

            <label for="id_password">
                Password
            </label>

            <input
                type="password"
                name="password"
                id="id_password"
                placeholder="Enter your password"
                required
            >

        </div>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="form-footer">
        Don't have an account?
        <a href="{% url 'auth:register' %}">
            Register here
        </a>
    </div>

</div>

{% endblock %}
